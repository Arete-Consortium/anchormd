app = 'anchormd-web'
primary_region = 'sjc'

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  ADMIN_GITHUB_USERNAME = "AreteDriver"
  SITE_URL = "https://anchormd.dev"
  # Set via `fly secrets set`:
  #   GITHUB_CLIENT_ID
  #   GITHUB_CLIENT_SECRET
  #   STRIPE_SECRET_KEY
  #   STRIPE_WEBHOOK_SECRET

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
